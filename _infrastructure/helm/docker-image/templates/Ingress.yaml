apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.name }}
  namespace: default
  annotations:
    "nginx.ingress.kubernetes.io/rewrite-target": "/"
    "cert-manager.io/cluster-issuer": {{ .Values.certIssuerName }}
spec:
  ingressClassName: "nginx"
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: {{ .Values.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.name }}
                port:
                  number: 80
  tls:
    - hosts:
        - {{ .Values.host }}
      secretName: {{ .Values.tlsSecretName }}